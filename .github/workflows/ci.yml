name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install ruff
      - run: ruff check urcm/ --select E,F,W,I --ignore E501,F841,F401 --output-format=github

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11"]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-timeout hypothesis
      - name: Generate brain file
        run: |
          python -c "
import os
import numpy as np
import pickle

brain_path = 'urcm_identity.pkl'
l2_dim = 1024
input_dim = 64
basic_concepts = ['exist', 'change', 'order', 'chaos', 'self', 'other', 'good', 'bad']
concept_map = {}
for word in basic_concepts:
    vec = np.random.randn(l2_dim)
    vec = vec / np.linalg.norm(vec)
    concept_map[word] = vec

brain_data = {
    'l2_W_res': np.random.randn(l2_dim, l2_dim) * (1.0 / np.sqrt(l2_dim)),
    'l2_W_in': np.random.randn(l2_dim, input_dim) * (1.0 / np.sqrt(l2_dim)),
    'concept_map': concept_map
}
with open(brain_path, 'wb') as f:
    pickle.dump(brain_data, f)
print(f'Generated {brain_path}')
"
      - name: Run unit tests
        run: pytest tests/ -v --timeout=60 -x -k "not integration and not bert and not commonsenseqa and not medical and not legal and not cuad and not drugbank" --tb=short
        timeout-minutes: 15

  build:
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/