version: "3.8"

services:
  resonanceai:
    build: .
    ports:
      - "8000:8000"
    environment:
      - URCM_ADMIN_KEY=${URCM_ADMIN_KEY:-URCM_ADMIN_OVERRIDE}
      - PYTHONUNBUFFERED=1
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
